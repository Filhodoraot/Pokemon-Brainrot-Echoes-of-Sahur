name: Brainrot Playtest Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'tools/**'
      - 'src/**'
      - 'data/**'
      - 'graphics/**'
      - 'custom_sprites/**'
      - 'custom_sprite_zips/**'
      - 'custom_player_sprites/**'
      - 'roan_sprites_rgba.zip'
      - 'roan_sprites_rgba/**'
      - 'roan_sprite_pack.zip'
      - 'roan_sprite_pack/**'
      - 'brainrot*.zip'
      - '*sprite*.zip'
      - '*sprites*.zip'
      - '*lote*.zip'
      - '*.zip'
      - 'sound/**'
      - 'Makefile'
      - 'make_tools.mk'
      - 'config.mk'
      - '.github/workflows/brainrot-playtest.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils-arm-none-eabi \
            gcc-arm-none-eabi \
            libpng-dev \
            pkg-config \
            python3 \
            python3-pil \
            make

      - name: Apply Brainrot test patches
        run: |
          python3 tools/apply_brainrot_test_build.py
          python3 tools/patch_brainrot_starters_first_forms.py
          python3 tools/patch_brainrot_types_phase1.py
          python3 tools/patch_brainrot_trainers.py
          python3 tools/replace_vanilla_pokemon_with_brainrots.py
          python3 tools/patch_brainrot_story_phase2.py
          python3 tools/patch_roan_skin_color.py
          python3 tools/patch_brainrot_starters_first_forms.py
          python3 tools/patch_safe_item_messages.py
          python3 tools/patch_brainrot_story_phase3.py
          python3 tools/patch_brainrot_intro_species.py
          python3 tools/patch_brainrot_story_phase4.py
          python3 tools/patch_brainrot_story_phase5.py
          python3 tools/patch_brainrot_story_phase6.py
          python3 tools/patch_brainrot_starters_first_forms.py
          python3 tools/replace_vanilla_pokemon_with_brainrots.py
          python3 tools/patch_safe_item_messages.py
          python3 tools/patch_brainrot_progression_and_text_cleanup.py
          python3 tools/patch_roan_skin_color.py
          python3 tools/patch_brainrot_difficulty_and_tests.py
          python3 tools/sanitize_asm_string_newlines.py
          python3 tools/apply_custom_sprite_dropins.py || echo "Optional custom sprite drop-ins failed; continuing with available graphics."
          python3 tools/sanitize_brainrot_sprite_sizes.py
          python3 tools/patch_roan_skin_color.py
          echo "Roan sprite auto-apply is disabled until palette/path mapping is fixed."

      - name: Build modern GBA ROM
        run: make firered_modern

      - name: Upload playtest ROM
        uses: actions/upload-artifact@v4
        with:
          name: brainrot-playtest-gba
          path: pokefirered_modern.gba
          if-no-files-found: error
